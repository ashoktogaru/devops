<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: #0b0f14;
      font-family: Arial;
    }

    .login-container {
      max-width: 350px;
      margin: 100px auto;
      padding: 30px;
      background: #111;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }

    .login-container h2 {
      color: white;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00ff88;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

<div class="login-container">
  <h2>Login to Access Course</h2>

  <!-- ✅ Correct Inputs -->
  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const url = "https://script.google.com/macros/s/AKfycbzcE1C8W3652UgImvCFM8SyeEl3uRI1DmQTaXXDxa7B4HOOzobcan5pvrF_jW5ukqdpXA/exec";

  try {
    const res = await fetch(url, {
      method: "POST",
      body: new URLSearchParams({
        email: email,
        password: pass
      })
    });

    const data = await res.json();

    console.log(data);

    if (data.status === "success") {
      localStorage.setItem("loggedIn", "true");
      window.location.href = "course.html";
    } else {
      alert("Invalid Email or Password");
    }

  } catch (err) {
    alert("Server error - check script deployment");
    console.error(err);
  }
}
</script>
}
</script>

</body>
</html>
